<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="YouTubeを逆再生できるウェブアプリ。速度調整やループ再生にも対応。">
  <meta name="keywords" content="YouTube, 逆再生, Reverse Player, 動画再生, 動画編集">
  <meta name="robots" content="index, follow">
  <title>YouTube Flip Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- ヘッダー -->
    <header>
      <h1>YouTube 反転プレーヤー</h1>
      <p>使い方: YouTubeの動画URLを貼って「読み込む」を押してください。区間ループは秒数を指定することで使用できます。</p>
    </header>

    <!-- 動画読み込みセクション -->
    <section class="load-section">
      <label for="urlInput">動画リンク/ID</label>
      <div class="url-input-wrap">
        <input id="urlInput" type="text" placeholder="https://www.youtube.com/watch?v=VIDEO_ID など" />
        <button id="urlClearBtn" class="url-clear-btn" type="button" aria-label="URLをクリア">×</button>
        <div id="historySuggestions" class="history-suggestions"></div>
      </div>
      <button id="loadBtn">読み込む</button>
      <button id="unloadBtn">読み込み解除</button>
    </section>

    <!-- プレーヤー -->
    <div class="player-wrap">
      <div id="iframeBox" class="iframe-box"></div>
    </div>

    <!-- メインコントロール -->
    <div class="controls">
      <button id="playPauseBtn">▶ 再生</button>
      <button id="reverseBtn">⏪ 逆再生</button>
      <button id="mirrorBtn">💫 左右反転</button>

      <label class="small">
        ループ: <input id="loopChk" type="checkbox" />
      </label>

      <label class="small">
        速度: <select id="speedSelect"></select>
        <span id="speedActive" class="speed-active">1.00x</span>
      </label>

      <label class="small slider-label">
        再生位置:
        <input id="posSlider" class="slider" type="range" min="0" max="100" value="0" />
      </label>

      <span id="timeLabel" class="small">0:00 / 0:00</span>
    </div>

    <p class="shortcut-hint">ショートカット: Space:再生/停止, R:逆再生, F:左右反転, A:速度ダウン, D:速度アップ</p>

    <!-- A-B 区間ループコントロール -->
    <div class="controls">
      <label class="small">
        始まり:
        <input id="pointA" type="text" placeholder="0:00" style="width: 35px;" />
        <button id="setAFromCurrent" title="現在の再生位置を始まりに設定">↩</button>
      </label>
      <label class="small">
        終わり:
        <input id="pointB" type="text" placeholder="0:00" style="width: 35px;" />
        <button id="setBFromCurrent" title="現在の再生位置を終わりに設定">↩</button>
      </label>
      <button id="setAB">区間ループ開始</button>
      <button id="clearAB">区間ループ解除</button>
    </div>

    <!-- プリセット管理 -->
    <div class="controls section-divider">
      <label class="small">
        設定名:
        <input id="presetName" type="text" placeholder="設定の名前を入力" style="width: 150px;" />
      </label>
      <button id="savePresetBtn">💾 設定を保存</button>
      <button id="clearPresetsBtn">🗑️ 全て削除</button>
    </div>

    <div id="presetsContainer"></div>

    <!-- フッター情報 -->
    <footer>
      <p class="note">注意: このページはYouTubeの埋め込みプレーヤー（IFrame Player API）を利用します。埋め込みが許可されていない動画は再生することができません。</p>
      <p class="note">YouTube Flip Player ver.2.0.0: Copyright © 2025-2026 nayuki</p>
    </footer>
  </div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <!-- アプリケーションスクリプト -->
  <script src="script.js"></script>
</body>
</html>
